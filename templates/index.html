<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CipherApp Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 text-zinc-100 font-sans min-h-screen flex flex-col">

    <header class="bg-zinc-900 border-b border-zinc-800 px-6 py-4 flex justify-between items-center">
        <div class="flex items-center space-x-2">
            <span class="text-xl">🔒</span>
            <h1 class="text-lg font-semibold tracking-wide text-zinc-200">CipherApp Studio</h1>
        </div>
        <div class="flex items-center space-x-2 bg-emerald-950/50 border border-emerald-800/60 px-3 py-1 rounded-full">
            <span class="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></span>
            <span class="text-xs font-medium text-emerald-400 tracking-wider uppercase">Connected</span>
        </div>
    </header>

    <main class="flex-1 max-w-7xl w-full mx-auto p-6 grid grid-cols-1 lg:grid-cols-2 gap-6">
        
        <section class="bg-zinc-900 border border-zinc-800 rounded-xl p-6 flex flex-col justify-between">
            <div>
                <h2 class="text-sm font-semibold uppercase tracking-wider text-indigo-400 mb-4">⚡ Mode Selection</h2>
                <div class="grid grid-cols-2 gap-2 mb-6 bg-zinc-950 p-1 rounded-lg border border-zinc-800">
                    <button class="py-2 text-sm font-medium rounded-md bg-indigo-600 text-white shadow-sm">Encode Mode</button>
                    <button class="py-2 text-sm font-medium rounded-md text-zinc-400 hover:text-zinc-200">Decode Mode</button>
                </div>

                <h2 class="text-sm font-semibold uppercase tracking-wider text-indigo-400 mb-2">📝 Input Data</h2>
                <textarea class="w-full h-32 bg-zinc-950 border border-zinc-800 rounded-lg p-3 text-sm text-zinc-300 focus:outline-none focus:border-indigo-500 placeholder-zinc-600 resize-none mb-4" placeholder="Enter English/Persian text or coordinate blocks here..."></textarea>

                <h2 class="text-sm font-semibold uppercase tracking-wider text-indigo-400 mb-2">🔑 Secret Shift Key</h2>
                <input type="number" class="w-full bg-zinc-950 border border-zinc-800 rounded-lg p-3 text-sm text-zinc-300 focus:outline-none focus:border-indigo-500 mb-4" value="0">
            </div>

            <button class="w-full bg-indigo-600 hover:bg-indigo-500 transition-colors text-white font-medium py-3 rounded-lg shadow-lg shadow-indigo-950/20">
                Execute Process Sequence
            </button>
        </section>

        <section class="bg-zinc-900 border border-zinc-800 rounded-xl p-6 flex flex-col space-y-6">
            <div>
                <h2 class="text-sm font-semibold uppercase tracking-wider text-indigo-400 mb-3">📊 Output Preview</h2>
                <div class="bg-zinc-950 border border-zinc-800 rounded-lg p-4 h-24 font-mono text-sm text-zinc-400 overflow-y-auto">
                    System idle. Awaiting user execution sequence...
                </div>
            </div>

            <div class="flex-1 flex flex-col">
                <h2 class="text-sm font-semibold uppercase tracking-wider text-indigo-400 mb-3">📈 Vector Coordinate Path</h2>
                <div class="flex-1 bg-zinc-950 border border-zinc-800 rounded-lg flex items-center justify-center p-4 text-sm text-zinc-500 font-mono min-h-[250px]">
                    No vector graph rendered yet.
                </div>
            </div>
        </section>

    </main>

</body>
</html>
