<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CipherApp Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-zinc-950 text-zinc-100 font-sans min-h-screen flex flex-col">

    <header class="bg-zinc-900 border-b border-zinc-800 px-6 py-4 flex justify-between items-center">
        <div class="flex items-center space-x-2">
            <span class="text-xl">🔒</span>
            <h1 class="text-lg font-semibold tracking-wide text-zinc-200">CipherApp Studio</h1>
        </div>
        <div class="flex items-center space-x-2 bg-emerald-950/50 border border-emerald-800/60 px-3 py-1 rounded-full">
            <span class="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></span>
            <span class="text-xs font-medium text-emerald-400 tracking-wider uppercase">Connected</span>
        </div>
    </header>

    <main class="flex-1 max-w-7xl w-full mx-auto p-6 grid grid-cols-1 lg:grid-cols-2 gap-6">

        <section class="bg-zinc-900 border border-zinc-800 rounded-xl p-6 flex flex-col justify-between">
            <div>
                <h2 class="text-sm font-semibold uppercase tracking-wider text-indigo-400 mb-4">⚡ Mode Selection</h2>
                <div class="grid grid-cols-2 gap-2 mb-6 bg-zinc-950 p-1 rounded-lg border border-zinc-800">
                    <button id="encodeTab"
                        class="py-2 text-sm font-medium rounded-md bg-indigo-600 text-white shadow-sm">Encode
                        Mode</button>
                    <button id="decodeTab"
                        class="py-2 text-sm font-medium rounded-md text-zinc-400 hover:text-zinc-200">Decode
                        Mode</button>
                </div>

                <h2 class="text-sm font-semibold uppercase tracking-wider text-indigo-400 mb-2">📝 Input Data</h2>
                <textarea id="inputText"
                    class="w-full h-32 bg-zinc-950 border border-zinc-800 rounded-lg p-3 text-sm text-zinc-300 focus:outline-none focus:border-indigo-500 placeholder-zinc-600 resize-none mb-4"
                    placeholder="Enter English/Persian text or coordinate blocks here..."></textarea>

                <h2 id="inputKey" class="text-sm font-semibold uppercase tracking-wider text-indigo-400 mb-2">🔑 Secret Shift Key</h2>
                <input type="number"
                    class="w-full bg-zinc-950 border border-zinc-800 rounded-lg p-3 text-sm text-zinc-300 focus:outline-none focus:border-indigo-500 mb-4"
                    value="0">
            </div>

            <button id="submitBtn"
                class="w-full bg-indigo-600 hover:bg-indigo-500 transition-colors text-white font-medium py-3 rounded-lg shadow-lg shadow-indigo-950/20">
                Execute Process Sequence
            </button>
        </section>

        <section class="bg-zinc-900 border border-zinc-800 rounded-xl p-6 flex flex-col space-y-6">
            <div>
                <h2 id="outputPreview" class="text-sm font-semibold uppercase tracking-wider text-indigo-400 mb-3">📊 Output Preview</h2>
                <div
                    class="bg-zinc-950 border border-zinc-800 rounded-lg p-4 h-24 font-mono text-sm text-zinc-400 overflow-y-auto">
                    System idle. Awaiting user execution sequence...
                </div>
            </div>

            <div class="flex-1 flex flex-col">
                <h2 class="text-sm font-semibold uppercase tracking-wider text-indigo-400 mb-3">📈 Vector Coordinate
                    Path</h2>
                <div
                    class="flex-1 bg-zinc-950 border border-zinc-800 rounded-lg flex items-center justify-center p-4 text-sm text-zinc-500 font-mono min-h-[250px]">
                    No vector graph rendered yet.
                </div>
            </div>
        </section>

    </main>

</body>
<script>
        // Select interactive DOM elements
        const encodeTab = document.getElementById('encodeTab');
        const decodeTab = document.getElementById('decodeTab');
        const inputText = document.getElementById('inputText');
        const inputKey = document.getElementById('inputKey');
        const submitBtn = document.getElementById('submitBtn');
        const outputPreview = document.getElementById('outputPreview');
        
        // Track the currently active application state
        let currentMode = 'encode';

        // Function to handle UI visual updates when shifting modes
        function setMode(mode) {
            // Clear input text and reset output container on every tab switch
            inputText.value = '';
            outputPreview.innerText = "System idle. Awaiting user execution sequence...";
            outputPreview.className = "bg-zinc-950 border border-zinc-800 rounded-lg p-4 h-24 font-mono text-sm text-zinc-400 overflow-y-auto";
            currentMode = mode;
            if (mode === 'encode') {
                encodeTab.className = "py-2 text-sm font-medium rounded-md bg-indigo-600 text-white shadow-sm";
                decodeTab.className = "py-2 text-sm font-medium rounded-md text-zinc-400 hover:text-zinc-200";
                inputText.placeholder = "Enter English/Persian text here...";
                submitBtn.innerText = "Execute Encryption Sequence";
            } else {
                decodeTab.className = "py-2 text-sm font-medium rounded-md bg-indigo-600 text-white shadow-sm";
                encodeTab.className = "py-2 text-sm font-medium rounded-md text-zinc-400 hover:text-zinc-200";
                inputText.placeholder = "Enter coordinate sequence data (e.g., 5,3 2,7)...";
                submitBtn.innerText = "Execute Decryption Sequence";
            }
        }

        // Attach responsive event listener tracks to the mode selector components
        encodeTab.addEventListener('click', () => setMode('encode'));
        decodeTab.addEventListener('click', () => setMode('decode'));

        // Core network transmission pipeline trigger
        submitBtn.addEventListener('click', async () => {
            // Provide instant visual loading feedback to the user
            outputPreview.innerText = "Processing sequence calculations...";
            outputPreview.className = "bg-zinc-950 border border-zinc-800 rounded-lg p-4 h-24 font-mono text-sm text-yellow-400 overflow-y-auto";

            // Construct the secure data package object
            const payload = {
                mode: currentMode,
                text: inputText.value,
                key: inputKey.value
            };

            try {
                // Dispatch secure data pipeline to Flask server backend
                const response = await fetch('/process', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (data.success) {
                    // Display pristine success calculation outputs
                    outputPreview.innerText = data.result;
                    outputPreview.className = "bg-zinc-950 border border-indigo-900 rounded-lg p-4 h-24 font-mono text-sm text-indigo-400 overflow-y-auto";
                } else {
                    // Display clean error feedback warning frames
                    outputPreview.innerText = `[!] Error: ${data.error}`;
                    outputPreview.className = "bg-zinc-950 border border-red-950 rounded-lg p-4 h-24 font-mono text-sm text-red-400 overflow-y-auto";
                }
            } catch (err) {
                outputPreview.innerText = "[!] Core Engine Network Connection Offline.";
                outputPreview.className = "bg-zinc-950 border border-red-950 rounded-lg p-4 h-24 font-mono text-sm text-red-400 overflow-y-auto";
            }
        });
    </script>

</html>
